<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CBC</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav class="top-bar">
        <div class="nav-logo">Comic Book Collector</div>
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="html/signup.html">Create Account</a>
        </div>
    </nav>

    <div class="login-container">
        <h2>Welcome Back</h2>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Username or Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Create one here</a>
        </div>

        <div class="divider">or</div>

        <div class="social-buttons">
            <div id="g_id_onload"
                data-client_id="125954975426-cbuqatgrr4obh9k9r2t3pi25hhrnjsk7.apps.googleusercontent.com"
                data-context="signin"
                data-ux_mode="popup"
                data-callback="handleGoogleResponse"
                data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        </div>
    </div>

    <script src="../app.js"></script>
</body>
</html>
