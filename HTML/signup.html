<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | My App</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="login-container">
    <h2>Create Account</h2>

    <form id="signupForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="text" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="login-btn">signup</button>
    </form>

    <div class="signup-link">
        Have an account? <a href="login.html">Login here</a>
    </div>

    <div class="divider">or</div>

    <div class="social-buttons">
        <div id="g_id_onload"
             data-client_id="125954975426-cbuqatgrr4obh9k9r2t3pi25hhrnjsk7.apps.googleusercontent.com"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleGoogleResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
    </div>
</div>

<script src="../app.js"></script>
</body>
</html>
